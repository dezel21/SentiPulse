conf:
  listen:
    host: 0.0.0.0
    port: 9000
  allow_list:
    - 0.0.0.0/0
  etcd:
    endpoints:
      - etcd:2379
    mtls:
      key_file: ""
      cert_file: ""
      ca_file: ""
    prefix: /apisix
    username: ""
    password: ""
  log:
    error_log:
      level: warn
      file_path: logs/error.log
    access_log:
      file_path: logs/access.log
  security:
    content_security_policy: "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-src *"
    x_frame_options: ""
    x_content_type_options: nosniff

authentication:
  secret: sentipulse-dashboard-secret-2026
  expire_time: 3600
  users:
    - username: admin
      password: admin
